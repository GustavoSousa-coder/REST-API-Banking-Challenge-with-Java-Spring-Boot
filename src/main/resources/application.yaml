spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bankdb?useTimezone=true&serverTimezone=UTC
    username: root
    password: 1234
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
    show-sql: true
logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
